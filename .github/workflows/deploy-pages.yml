name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/friendly-heisenberg-qfahi3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（古いデプロイは取り消す）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages が未設定でもこのアクションが自動で有効化する
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ直下の静的サイトをそのまま公開
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
